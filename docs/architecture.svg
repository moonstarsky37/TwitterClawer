<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1010" font-family="Segoe UI, 'Noto Sans', -apple-system, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#005CAF"/>
    </marker>
    <marker id="aw" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C7802D"/>
    </marker>
  </defs>

  <rect width="1400" height="1010" fill="#FCFAF2"/>

  <!-- title -->
  <text x="60" y="80" fill="#08192D" font-size="38" font-weight="700">TwitterClawer — Software Architecture</text>
  <text x="60" y="118" fill="#5C6672" font-size="18">Local archiver and offline comic reader for artists on X — everything stays on your machine.</text>

  <!-- ===== external: left ===== -->
  <rect x="60" y="220" width="230" height="100" rx="12" fill="#FFFFFF" stroke="#8A97A8" stroke-width="1.5"/>
  <text x="175" y="262" text-anchor="middle" fill="#08192D" font-size="16" font-weight="600">x.com · twimg.com</text>
  <text x="175" y="288" text-anchor="middle" fill="#5C6672" font-size="12.5">the only hosts contacted</text>

  <rect x="60" y="360" width="230" height="130" rx="12" fill="#FFFFFF" stroke="#8A97A8" stroke-width="1.5"/>
  <text x="175" y="400" text-anchor="middle" fill="#08192D" font-size="16" font-weight="600">Firefox profile</text>
  <text x="175" y="426" text-anchor="middle" fill="#5C6672" font-size="12.5">cookies.sqlite — session cookie</text>
  <text x="175" y="452" text-anchor="middle" fill="#C7802D" font-size="12.5" font-weight="600">passwords never opened</text>

  <!-- ===== main container ===== -->
  <rect x="350" y="170" width="720" height="780" rx="16" fill="none" stroke="#005CAF" stroke-width="2"/>
  <rect x="520" y="156" width="380" height="28" rx="14" fill="#FCFAF2"/>
  <text x="710" y="176" text-anchor="middle" fill="#005CAF" font-size="16" font-weight="700">Local pipeline — uv-managed Python</text>

  <!-- zone: fetch -->
  <rect x="380" y="210" width="660" height="170" rx="12" fill="#005CAF" fill-opacity="0.05" stroke="#005CAF" stroke-opacity="0.3"/>
  <text x="710" y="240" text-anchor="middle" fill="#005CAF" font-size="15" font-weight="700">Fetch</text>
  <rect x="410" y="258" width="290" height="96" rx="10" fill="#FFFFFF" stroke="#005CAF" stroke-width="1.5"/>
  <text x="555" y="288" text-anchor="middle" fill="#08192D" font-size="16" font-weight="600">gallery-dl</text>
  <text x="555" y="312" text-anchor="middle" fill="#5C6672" font-size="12.5">original-size images + tweet text/dates</text>
  <text x="555" y="334" text-anchor="middle" fill="#5C6672" font-size="12.5">polite rate limits, safe to interrupt</text>
  <rect x="740" y="258" width="270" height="96" rx="10" fill="#FFFFFF" stroke="#005CAF" stroke-width="1.5"/>
  <text x="875" y="294" text-anchor="middle" fill="#08192D" font-size="16" font-weight="600">artists.json</text>
  <text x="875" y="320" text-anchor="middle" fill="#5C6672" font-size="12.5">tracked artist list, git-tracked</text>
  <path d="M 740 306 H 704" fill="none" stroke="#005CAF" stroke-width="2" marker-end="url(#a)"/>

  <!-- zone: archive -->
  <rect x="380" y="410" width="660" height="170" rx="12" fill="#08192D" fill-opacity="0.035" stroke="#08192D" stroke-opacity="0.18"/>
  <text x="710" y="440" text-anchor="middle" fill="#08192D" font-size="15" font-weight="700">Archive — one folder per artist</text>
  <rect x="410" y="458" width="290" height="96" rx="10" fill="#FFFFFF" stroke="#8A97A8" stroke-width="1.5"/>
  <text x="555" y="492" text-anchor="middle" fill="#08192D" font-size="16" font-weight="600">data/&lt;artist&gt;/raw/</text>
  <text x="555" y="518" text-anchor="middle" fill="#5C6672" font-size="12.5">images + metadata sidecars, gitignored</text>
  <rect x="740" y="458" width="270" height="96" rx="10" fill="#FFFFFF" stroke="#8A97A8" stroke-width="1.5"/>
  <text x="875" y="492" text-anchor="middle" fill="#08192D" font-size="16" font-weight="600">archive.db</text>
  <text x="875" y="518" text-anchor="middle" fill="#5C6672" font-size="12.5">done-list — re-runs fetch only new posts</text>

  <!-- zone: organize -->
  <rect x="380" y="610" width="660" height="170" rx="12" fill="#005CAF" fill-opacity="0.05" stroke="#005CAF" stroke-opacity="0.3"/>
  <text x="710" y="640" text-anchor="middle" fill="#005CAF" font-size="15" font-weight="700">Organize</text>
  <rect x="410" y="658" width="290" height="96" rx="10" fill="#FFFFFF" stroke="#005CAF" stroke-width="1.5"/>
  <text x="555" y="692" text-anchor="middle" fill="#08192D" font-size="16" font-weight="600">organizer</text>
  <text x="555" y="718" text-anchor="middle" fill="#5C6672" font-size="12.5">a reply thread becomes one chapter</text>
  <rect x="740" y="658" width="270" height="96" rx="10" fill="#FFFFFF" stroke="#C7802D" stroke-width="1.5"/>
  <text x="875" y="688" text-anchor="middle" fill="#08192D" font-size="16" font-weight="600">manifest.json</text>
  <text x="875" y="712" text-anchor="middle" fill="#5C6672" font-size="12.5">chapter index, git-tracked</text>
  <text x="875" y="734" text-anchor="middle" fill="#C7802D" font-size="12.5" font-weight="600">= recovery blueprint</text>
  <path d="M 700 706 H 736" fill="none" stroke="#005CAF" stroke-width="2" marker-end="url(#a)"/>

  <!-- zone: publish -->
  <rect x="380" y="810" width="660" height="120" rx="12" fill="#005CAF" fill-opacity="0.05" stroke="#005CAF" stroke-opacity="0.3"/>
  <rect x="410" y="838" width="290" height="72" rx="10" fill="#FFFFFF" stroke="#005CAF" stroke-width="1.5"/>
  <text x="555" y="866" text-anchor="middle" fill="#08192D" font-size="16" font-weight="600">site generator</text>
  <text x="555" y="890" text-anchor="middle" fill="#5C6672" font-size="12.5">self-contained HTML, zero infrastructure</text>
  <rect x="740" y="838" width="270" height="72" rx="10" fill="#FFFFFF" stroke="#005CAF" stroke-width="1.5"/>
  <text x="875" y="866" text-anchor="middle" fill="#08192D" font-size="16" font-weight="600">index.html + sites/*.html</text>
  <text x="875" y="890" text-anchor="middle" fill="#5C6672" font-size="12.5">overview + one reader per artist</text>
  <path d="M 700 874 H 736" fill="none" stroke="#005CAF" stroke-width="2" marker-end="url(#a)"/>

  <!-- vertical flow arrows -->
  <path d="M 555 354 V 454" fill="none" stroke="#005CAF" stroke-width="2" marker-end="url(#a)"/>
  <path d="M 555 554 V 654" fill="none" stroke="#005CAF" stroke-width="2" marker-end="url(#a)"/>
  <path d="M 555 754 V 834" fill="none" stroke="#005CAF" stroke-width="2" marker-end="url(#a)"/>

  <!-- external arrows: left -->
  <path d="M 290 270 H 406" fill="none" stroke="#005CAF" stroke-width="2" marker-end="url(#a)"/>
  <rect x="296" y="240" width="80" height="22" rx="11" fill="#FFFFFF" stroke="#8A97A8" stroke-width="1"/>
  <text x="336" y="255" text-anchor="middle" fill="#5C6672" font-size="11.5">HTTPS</text>

  <path d="M 290 425 H 330 V 330 H 406" fill="none" stroke="#005CAF" stroke-width="2" marker-end="url(#a)"/>
  <rect x="228" y="497" width="196" height="22" rx="11" fill="#FFFFFF" stroke="#8A97A8" stroke-width="1"/>
  <text x="326" y="512" text-anchor="middle" fill="#5C6672" font-size="11.5">session cookie · read-only</text>

  <!-- ===== external: right ===== -->
  <rect x="1130" y="620" width="220" height="130" rx="12" fill="#FFFFFF" stroke="#C7802D" stroke-width="1.5"/>
  <text x="1240" y="658" text-anchor="middle" fill="#08192D" font-size="16" font-weight="600">Repair (on demand)</text>
  <text x="1240" y="684" text-anchor="middle" fill="#5C6672" font-size="12.5">re-downloads any file missing</text>
  <text x="1240" y="706" text-anchor="middle" fill="#5C6672" font-size="12.5">from the manifest, byte-identical</text>
  <path d="M 1010 706 H 1126" fill="none" stroke="#C7802D" stroke-width="2" marker-end="url(#aw)"/>
  <path d="M 1240 620 V 495 H 1044" fill="none" stroke="#C7802D" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#aw)"/>
  <rect x="1088" y="464" width="150" height="22" rx="11" fill="#FFFFFF" stroke="#C7802D" stroke-width="1"/>
  <text x="1163" y="479" text-anchor="middle" fill="#C7802D" font-size="11.5">refills missing files</text>

  <rect x="1130" y="820" width="220" height="110" rx="12" fill="#FFFFFF" stroke="#8A97A8" stroke-width="1.5"/>
  <text x="1240" y="858" text-anchor="middle" fill="#08192D" font-size="16" font-weight="600">Your browser</text>
  <text x="1240" y="884" text-anchor="middle" fill="#5C6672" font-size="12.5">double-click index.html</text>
  <text x="1240" y="906" text-anchor="middle" fill="#5C6672" font-size="12.5">offline, no server</text>
  <path d="M 1010 874 H 1126" fill="none" stroke="#005CAF" stroke-width="2" marker-end="url(#a)"/>
  <rect x="1032" y="843" width="72" height="22" rx="11" fill="#FFFFFF" stroke="#8A97A8" stroke-width="1"/>
  <text x="1068" y="858" text-anchor="middle" fill="#5C6672" font-size="11.5">file://</text>
</svg>
